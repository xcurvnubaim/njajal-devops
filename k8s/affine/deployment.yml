apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine
  namespace: default
  labels:
    app: affine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: affine
  template:
    metadata:
      labels:
        app: affine
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do echo waiting for redis; sleep 2; done
              until nc -z "$POSTGRES_HOST" 5432; do echo waiting for postgres; sleep 2; done
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: affine-credentials
                  key: POSTGRES_HOST
        - name: affine-migration
          image: ghcr.io/toeverything/affine:stable
          command:
            - sh
            - -c
            - node ./scripts/self-host-predeploy.js
          env:
            - name: REDIS_SERVER_HOST
              value: redis
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: affine-credentials
                  key: DATABASE_URL
            - name: AFFINE_INDEXER_ENABLED
              value: "false"
          volumeMounts:
            - name: affine-storage
              mountPath: /root/.affine/storage
            - name: affine-config
              mountPath: /root/.affine/config
      containers:
        - name: affine
          image: ghcr.io/toeverything/affine:stable
          env:
            - name: REDIS_SERVER_HOST
              value: redis
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: affine-credentials
                  key: DATABASE_URL
            - name: AFFINE_INDEXER_ENABLED
              value: "false"
          ports:
            - containerPort: 3010
          volumeMounts:
            - name: affine-storage
              mountPath: /root/.affine/storage
            - name: affine-config
              mountPath: /root/.affine/config
      volumes:
        - name: affine-storage
          persistentVolumeClaim:
            claimName: affine-storage-pvc
        - name: affine-config
          persistentVolumeClaim:
            claimName: affine-config-pvc
