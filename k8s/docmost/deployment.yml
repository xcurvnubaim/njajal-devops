apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost
  namespace: default
  labels:
    app: docmost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docmost
  template:
    metadata:
      labels:
        app: docmost
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z "$POSTGRES_HOST" 5432; do echo waiting for postgres; sleep 2; done
              until nc -z redis 6379; do echo waiting for redis; sleep 2; done
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: POSTGRES_HOST
      containers:
        - name: docmost
          image: docmost/docmost:latest
          env:
            - name: APP_URL
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: APP_URL
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: APP_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: STORAGE_DRIVER
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: STORAGE_DRIVER
            - name: AWS_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: AWS_S3_ACCESS_KEY_ID
            - name: AWS_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: AWS_S3_SECRET_ACCESS_KEY
            - name: AWS_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: AWS_S3_REGION
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: AWS_S3_BUCKET
            - name: AWS_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: AWS_S3_ENDPOINT
            - name: AWS_S3_FORCE_PATH_STYLE
              valueFrom:
                secretKeyRef:
                  name: docmost-credentials
                  key: AWS_S3_FORCE_PATH_STYLE
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: docmost-storage
              mountPath: /app/data/storage
      volumes:
        - name: docmost-storage
          persistentVolumeClaim:
            claimName: docmost-storage-pvc